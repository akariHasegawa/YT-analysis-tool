<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      padding: 20px;
      background: #0a0c14;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: white;
    }
    .logo-text {
      font-weight: 600;
      font-size: 14px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 14px;
      font-size: 12px;
    }
    .status.connected {
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
    }
    .status.disconnected {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #fca5a5;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green { background: #22c55e; }
    .dot.red { background: #ef4444; }
    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      margin-bottom: 8px;
    }
    .btn-secondary {
      background: rgba(99, 102, 241, 0.12);
      color: #a5b4fc;
      border: 1px solid rgba(99, 102, 241, 0.25);
    }
    .hint {
      margin-top: 14px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      line-height: 1.6;
      color: #94a3b8;
      font-size: 11px;
    }
    .hint strong { color: #cbd5e1; }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-icon">AI</div>
    <span class="logo-text">AIAI-short</span>
  </div>

  <div id="status" class="status disconnected">
    <span class="dot red" id="dot"></span>
    <span id="status-text">未接続</span>
  </div>

  <button class="btn btn-primary" id="open-btn">AIAI-shortで連携する</button>
  <button class="btn btn-secondary" id="disconnect-btn" style="display:none">連携を解除する</button>

  <div class="hint">
    <strong>使い方：</strong><br>
    1. 上のボタンでAIAI-shortを開く<br>
    2. ログイン後「Chrome拡張と連携」をクリック<br>
    3. TikTok・Instagramで「分析する」ボタンを押す
  </div>

  <script src="popup.js"></script>
</body>
</html>
